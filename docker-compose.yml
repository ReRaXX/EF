version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: user_mgmt_postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_management
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
